*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:20px 16px 80px}
/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:32px;width:100%;max-width:360px}
.login-box h2{font-size:20px;margin-bottom:4px}.login-box .sub{color:var(--tx2);font-size:13px;margin-bottom:24px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.field input{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:10px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px}

.btn-login{width:100%;padding:10px;background:var(--ac);color:var(--bg);border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-login:hover{background:var(--ac2)}.err-msg{color:var(--rd);font-size:12px;margin-top:8px;display:none}
/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);margin-bottom:20px}
.topbar-left{display:flex;align-items:center;gap:8px}.topbar-user{font-size:12px;color:var(--tx2)}
.btn-out{background:none;border:1px solid var(--bd);color:var(--tx2);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-out:hover{border-color:var(--rd);color:var(--rd)}
/* Client bar */
.cbar{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cbar label{font-size:12px;color:var(--tx2);font-weight:500}
.csel{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;min-width:180px}
.csel:focus{outline:none;border-color:var(--ac)}
.cactions{display:flex;gap:5px;margin-left:auto}
.btn-s{padding:5px 12px;border-radius:5px;border:1px solid var(--bd);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;background:var(--s2);transition:all .15s}
.btn-s.add{color:var(--ac);border-color:var(--ac)}.btn-s.add:hover{background:var(--gn-bg)}
.btn-s.del{color:var(--rd);border-color:transparent}.btn-s.del:hover{background:var(--rd-bg)}
.btn-s.dup{color:var(--bl);border-color:transparent}.btn-s.dup:hover{background:var(--bl-bg)}
.btn-s.exp{color:var(--yl);border-color:transparent}.btn-s.exp:hover{background:var(--yl-bg)}

.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.mo.show{display:flex}.mbox{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:24px;width:90%;max-width:420px}
.mbox h3{font-size:16px;margin-bottom:14px}.mbox input,.mbox select{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:9px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:10px}
.mbox input:focus,.mbox select:focus{outline:none;border-color:var(--ac)}
.mbox .hint{font-size:11px;color:var(--tx2);margin-bottom:14px}
.mbtns{display:flex;gap:8px;justify-content:flex-end}.mbtn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600}
.mbtn-c{background:var(--s2);color:var(--tx2)}.mbtn-ok{background:var(--ac);color:var(--bg)}.mbtn-ok:hover{background:var(--ac2)}

.hero h1{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}

.pw{display:flex;align-items:center;gap:12px}.pt{flex:1;height:5px;background:var(--s2);border-radius:3px;overflow:hidden}
.pb{height:100%;background:var(--ac);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pl{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ac);min-width:85px;text-align:right}
/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--tx2)}.empty p{margin-bottom:12px;font-size:14px}

.ph:hover{border-color:#3a3a44}
.phh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.phl{display:flex;align-items:center;gap:8px}
.phn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx2);background:var(--s2);padding:2px 7px;border-radius:3px}

.phr{display:flex;align-items:center;gap:10px}
.phcnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx2)}
.phchev{color:var(--tx2);transition:transform .25s;font-size:14px}.phchev.open{transform:rotate(180deg)}
.pill{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:3px}
.pill-r{background:var(--rd-bg);color:var(--rd)}.pill-y{background:var(--yl-bg);color:var(--yl)}
.pill-b{background:var(--bl-bg);color:var(--bl)}.pill-g{background:var(--gn-bg);color:var(--ac)}

.it{display:flex;align-items:flex-start;gap:8px;padding:5px 0}
.it input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:2px solid var(--bd);border-radius:3px;cursor:pointer;flex-shrink:0;margin-top:2px;position:relative;transition:all .12s;background:transparent}
.it input[type=checkbox]:checked{background:var(--ac);border-color:var(--ac)}
.it input[type=checkbox]:checked::after{content:'\2713';position:absolute;top:-1px;left:1.5px;font-size:11px;color:var(--bg);font-weight:700}
.it label{cursor:pointer;font-size:12.5px;line-height:1.4;flex:1;transition:all .2s}
.it label.done{text-decoration:line-through;color:var(--tx2);opacity:.5}

/* Edit inline */

.edit-inline input{flex:1;min-width:150px;background:var(--s2);border:1px solid var(--ac);color:var(--tx);padding:5px 8px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12px}
.edit-inline select{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:5px 8px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:11px}
.edit-inline button{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600}
.edit-inline .btn-save{background:var(--ac);color:var(--bg)}.edit-inline .btn-cancel{background:var(--s2);color:var(--tx2)}
/* Datos section */
.datos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.dato-field{display:flex;flex-direction:column;gap:2px}
.dato-field label{font-size:10px;color:var(--tx2);font-weight:500}
.dato-field input{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:6px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px}
.dato-field input:focus{outline:none;border-color:var(--ac)}
/* Footer */
.foot{display:flex;gap:6px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);flex-wrap:wrap}
.fbtn{padding:7px 14px;border-radius:5px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;transition:all .15s}
.fbtn-r{background:var(--s2);color:var(--rd)}.fbtn-r:hover{background:var(--rd-bg)}
.fbtn-e{background:var(--s2);color:var(--ac)}.fbtn-e:hover{background:var(--gn-bg)}
@media(max-width:600px){.app{padding:12px 10px 50px}.cbar{padding:10px 12px}.cactions{margin-left:0;width:100%}.datos-grid{grid-template-columns:1fr}}
</style>

function shouldShowSection(section, tipo) {
  if (!section.flow) return true;
  if (tipo === 'outbound+inbound') return true;
  if (tipo === 'outbound' && section.flow === 'outbound') return true;
  if (tipo === 'inbound' && section.flow === 'inbound') return true;
  return false;
}

function getItemText(item) {
  const ov = taskOverrides[item.id];
  return ov && ov.text ? ov.text : (item.t || item.text);
}

function getItemTag(item) {
  const ov = taskOverrides[item.id];
  return ov && ov.tag ? ov.tag : (item.tg || item.tag || 'Dev');
}

function isHidden(id) {
  return hiddenTasks.includes(id);
}

// ===== API =====
async function api(method,url,body){
  const opts={method,headers:{'Content-Type':'application/json','x-auth-token':TOKEN}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  if(r.status===401){TOKEN='';USER='';localStorage.removeItem('ob_token');localStorage.removeItem('ob_user');renderApp();return null;}
  return r.json();
}

// ===== Render =====
function renderApp(){
  const el=document.getElementById('app');
  if(!TOKEN){el.innerHTML=loginHTML();return;}
  loadClients();
}

function loginHTML(){
  return`<div class="login-wrap"><div class="login-box"><h2>Onboarding</h2><p class="sub">Agentes de Voz</p>
  <div class="field"><label>Usuario</label><input id="lu" placeholder="usuario"></div>
  <div class="field"><label>Contraseña</label><input id="lp" type="password" placeholder="contraseña"></div>
  <button class="btn-login" onclick="doLogin()">Entrar</button>
  <div class="err-msg" id="lerr"></div></div></div>`;
}

async function doLogin(){
  const u=document.getElementById('lu').value,p=document.getElementById('lp').value;
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:u,pass:p})});
  const d=await r.json();
  if(d.error){document.getElementById('lerr').style.display='block';document.getElementById('lerr').textContent=d.error;return;}
  TOKEN=d.token;USER=d.user;localStorage.setItem('ob_token',TOKEN);localStorage.setItem('ob_user',USER);renderApp();
}

async function doLogout(){await api('POST','/api/logout');TOKEN='';USER='';localStorage.removeItem('ob_token');localStorage.removeItem('ob_user');renderApp();}

async function loadClients(){
  const d=await api('GET','/api/clients');if(!d)return;
  clientsCache=d.clients||{};customSteps=d.customSteps||[];taskOverrides=d.taskOverrides||{};hiddenTasks=d.hiddenTasks||[];
  if(currentClient&&!clientsCache[currentClient])currentClient='';
  if(!currentClient){const k=Object.keys(clientsCache);if(k.length)currentClient=k[0];}
  if(currentClient)await loadClient(currentClient);else clientData=null;
  renderMain();
}

async function loadClient(id){
  const d=await api('GET','/api/clients/'+id);if(!d)return;
  clientData=d.client;customSteps=d.customSteps||[];taskOverrides=d.taskOverrides||{};hiddenTasks=d.hiddenTasks||[];
  currentClient=id;localStorage.setItem('ob_current',id);
}

function renderMain(){
  const el=document.getElementById('app');
  let h=`<div class="app">`;
  h+=`<div class="topbar"><div class="topbar-left"><span class="topbar-user">${USER}</span></div><button class="btn-out" onclick="doLogout()">Salir</button></div>`;
  h+=renderClientBar();
  if(!currentClient||!clientData){h+=`<div class="hero"><h1>Onboarding</h1><p class="sub">Seleccioná o creá un cliente</p><div class="pw"><div class="pt"><div class="pb" style="width:0"></div></div><div class="pl">—</div></div></div>`;h+=`<div class="empty"><p>Creá un cliente para empezar</p></div>`;}
  else{h+=renderHero();h+=renderPhases();h+=renderFooter();}
  h+=`</div>`;h+=renderModal();
  el.innerHTML=h;
}

function calcProgress(c){
  const info=clientsCache[c];if(!info)return 0;
  const tipo=info.tipo||'outbound+inbound';
  let total=0;
  PHASES.forEach(p=>{
    p.sections.forEach(s=>{
      if(shouldShowSection(s,tipo)){
        s.items.forEach(i=>{if(!isHidden(i.id))total++;});
      }
    });
  });
  customSteps.forEach(cs=>{if(!isHidden(cs.id))total++;});
  if(!total)return 0;
  const checks=info.checks||{};
  const done=Object.values(checks).filter(ck=>ck.done).length;
  return Math.round(done/total*100);
}

function renderClientBar(){
  const clients=Object.keys(clientsCache).sort();
  let opts=clients.length?clients.map(c=>`<option value="${c}"${c===currentClient?' selected':''}>${clientsCache[c].name} (${calcProgress(c)}%)</option>`).join(''):'<option value="">— Sin clientes —</option>';
  return`<div class="cbar"><label>Cliente:</label><select class="csel" onchange="switchClient(this.value)">${opts}</select><div class="cactions"><button class="btn-s add" onclick="showModal('add')">+ Nuevo</button><button class="btn-s dup" onclick="showModal('dup')">Duplicar</button><button class="btn-s del" onclick="delClient()">Eliminar</button></div></div>`;
}

function renderHero(){
  const checks=clientData.checks||{};
  const allItems=getVisibleItems();
  const done=allItems.filter(i=>checks[i.id]&&checks[i.id].done).length;
  const pct=allItems.length?Math.round(done/allItems.length*100):0;
  return`<div class="hero"><h1>${clientData.name}</h1><p class="sub">Tipo: ${clientData.tipo} · Creado: ${clientData.created}</p><div class="pw"><div class="pt"><div class="pb" style="width:${pct}%"></div></div><div class="pl">${done}/${allItems.length} · ${pct}%</div></div></div>`;
}

function getAllItems(){
  let items=PHASES.flatMap(p=>p.sections.flatMap(s=>s.items));
  customSteps.forEach(cs=>{items.push({id:cs.id,t:cs.text,tg:cs.tag||'Dev',tc:tagClass(cs.tag||'Dev')});});
  return items;
}

function getVisibleItems(){
  const tipo=clientData?clientData.tipo:'outbound+inbound';
  let items=[];
  PHASES.forEach(p=>{
    p.sections.forEach(s=>{
      if(shouldShowSection(s,tipo)){
        s.items.forEach(i=>{if(!isHidden(i.id))items.push(i);});
      }
    });
  });
  customSteps.forEach(cs=>{
    if(!isHidden(cs.id)){
      const matchPhase=PHASES.find(p=>p.id===cs.phaseId);
      if(matchPhase)items.push({id:cs.id,t:cs.text,tg:cs.tag||'Dev',tc:tagClass(cs.tag||'Dev')});
    }
  });
  return items;
}

function renderPhases(){
  const checks=clientData.checks||{};const notes=clientData.notes||{};const datos=clientData.datos||{};
  const tipo=clientData.tipo||'outbound+inbound';
  let h='';
  PHASES.forEach(p=>{
    const visibleSections=p.sections.filter(s=>shouldShowSection(s,tipo));
    if(visibleSections.length===0)return;
    const allItems=[...visibleSections.flatMap(s=>s.items.filter(i=>!isHidden(i.id))),...customSteps.filter(cs=>cs.phaseId===p.id&&!isHidden(cs.id))];
    const done=allItems.filter(i=>checks[i.id||i]&&checks[i.id||i].done).length;
    h+=`<div class="ph"><div class="phh" onclick="togPh('${p.id}')"><div class="phl"><span class="phn">${p.num}</span><span class="phname">${p.title}</span><span class="pill ${p.pc}">${p.pill}</span></div><div class="phr"><span class="phcnt" id="cnt_${p.id}">${done}/${allItems.length}</span><span class="phchev" id="chv_${p.id}">▾</span></div></div>`;
    h+=`<div class="phb" id="bd_${p.id}">`;
    if(p.note)h+=`<div class="note-box">${p.note}</div>`;
    visibleSections.forEach(s=>{
      if(s.label)h+=`<div class="stit">${s.label}</div>`;
      s.items.forEach(i=>{
        if(isHidden(i.id))return;
        const text=getItemText(i);const tag=getItemTag(i);const tc=tagClass(tag);
        const ck=checks[i.id];const isDone=ck&&ck.done;const nt=notes[i.id]||'';
        h+=`<div class="it"><input type="checkbox" ${isDone?'checked':''} onchange="togCheck('${i.id}',this.checked)"><label class="${isDone?'done':''}">${esc(text)} <span class="tg ${tc}" onclick="event.stopPropagation();cycleTag('${i.id}','${tag}',false)">${tag}</span></label>`;
        h+=`<div class="it-actions"><button class="btn-edit" title="Editar" onclick="startEdit('${i.id}','${esc(text).replace(/'/g,"\\'")}','${tag}',false)">&#9998;</button><button class="btn-del" title="Eliminar" onclick="hideTask('${i.id}')">&#10005;</button></div></div>`;
        if(isDone&&ck.date)h+=`<div class="check-meta" style="margin-left:24px">${new Date(ck.date).toLocaleDateString('es')} · ${ck.user||''}</div>`;
        if(editingTask===i.id)h+=renderEditInline(i.id,text,tag,false);
        h+=`<div style="margin-left:24px"><input class="it-note" placeholder="nota..." value="${esc(nt)}" onblur="saveNote('${i.id}',this.value)"></div>`;
        if(i.dato){const v=datos[i.dato]||'';h+=`<div style="margin-left:24px;margin-top:2px"><input class="it-note" style="color:var(--ac);border-color:var(--bd)" placeholder="${i.dato}" value="${esc(v)}" onblur="saveDato('${i.dato}',this.value)"></div>`;}
      });
    });
    const csteps=customSteps.filter(cs=>cs.phaseId===p.id&&!isHidden(cs.id));
    csteps.forEach(cs=>{
      const text=getItemText(cs);const tag=getItemTag(cs);const tc=tagClass(tag);
      const ck=checks[cs.id];const isDone=ck&&ck.done;const nt=notes[cs.id]||'';
      h+=`<div class="it"><input type="checkbox" ${isDone?'checked':''} onchange="togCheck('${cs.id}',this.checked)"><label class="${isDone?'done':''}">${esc(text)} <span class="tg ${tc}" onclick="event.stopPropagation();cycleTag('${cs.id}','${tag}',true)">${tag}</span></label>`;
      h+=`<div class="it-actions"><button class="btn-edit" title="Editar" onclick="startEdit('${cs.id}','${esc(text).replace(/'/g,"\\'")}','${tag}',true)">&#9998;</button><button class="btn-del" title="Eliminar" onclick="delStep('${cs.id}')">&#10005;</button></div></div>`;
      if(isDone&&ck.date)h+=`<div class="check-meta" style="margin-left:24px">${new Date(ck.date).toLocaleDateString('es')} · ${ck.user||''}</div>`;
      if(editingTask===cs.id)h+=renderEditInline(cs.id,text,tag,true);
      h+=`<div style="margin-left:24px"><input class="it-note" placeholder="nota..." value="${esc(nt)}" onblur="saveNote('${cs.id}',this.value)"></div>`;
    });
    h+=`<div class="add-step"><input id="ns_${p.id}" placeholder="Agregar paso..."><select id="nstag_${p.id}">${TAG_OPTIONS.map(t=>`<option value="${t}">${t}</option>`).join('')}</select><button onclick="addStep('${p.id}')">+</button></div>`;
    h+=`</div></div>`;
  });
  return h;
}

function renderEditInline(id,text,tag,isCustom){
  const tagOpts=TAG_OPTIONS.map(t=>`<option value="${t}"${t===tag?' selected':''}>${t}</option>`).join('');
  return`<div class="edit-inline"><input id="edit_text_${id}" value="${esc(text)}"><select id="edit_tag_${id}">${tagOpts}</select><button class="btn-save" onclick="saveEdit('${id}',${isCustom})">OK</button><button class="btn-cancel" onclick="cancelEdit()">Cancel</button></div>`;
}

function renderFooter(){
  return`<div class="foot"><button class="fbtn fbtn-r" onclick="resetCl()">Resetear</button><button class="fbtn fbtn-e" onclick="exportCl()">Copiar estado</button></div>`;
}

function renderModal(){
  return`<div class="mo" id="modal"><div class="mbox"><h3 id="mtitle">Nuevo</h3><input id="mname" placeholder="Nombre clínica"><select id="mtipo"><option value="outbound+inbound">Outbound + Inbound</option><option value="outbound">Solo Outbound</option><option value="inbound">Solo Inbound</option></select><div class="mbtns"><button class="mbtn mbtn-c" onclick="closeModal()">Cancelar</button><button class="mbtn mbtn-ok" id="mok" onclick="confirmModal()">Crear</button></div></div></div>`;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== Actions =====
let modalMode='add';

function showModal(mode){
  modalMode=mode;
  document.getElementById('mtitle').textContent=mode==='add'?'Nuevo cliente':'Duplicar: '+(clientData?clientData.name:'');
  document.getElementById('mok').textContent=mode==='add'?'Crear':'Duplicar';
  document.getElementById('mname').value=mode==='dup'&&clientData?clientData.name+' (copia)':'';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('mname').focus(),100);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

async function confirmModal(){
  const name=document.getElementById('mname').value.trim();if(!name)return;
  const tipo=document.getElementById('mtipo').value;
  const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_');
  closeModal();
  if(modalMode==='add'){await api('POST','/api/clients',{id,name,tipo});}
  else{await api('POST','/api/clients/'+currentClient+'/duplicate',{newId:id,newName:name});}
  currentClient=id;await loadClients();
}

async function switchClient(id){currentClient=id;localStorage.setItem('ob_current',id);await loadClient(id);renderMain();}
async function delClient(){if(!currentClient||!confirm('¿Eliminar "'+clientData.name+'"?'))return;await api('DELETE','/api/clients/'+currentClient);currentClient='';await loadClients();}
async function resetCl(){if(!confirm('¿Resetear progreso?'))return;await api('PUT','/api/clients/'+currentClient,{checks:{},notes:{}});await loadClient(currentClient);renderMain();}

async function togCheck(id,done){
  await api('POST','/api/clients/'+currentClient+'/check',{checkId:id,done});
  await loadClient(currentClient);renderMain();
}
async function saveNote(id,val){await api('POST','/api/clients/'+currentClient+'/note',{checkId:id,value:val});}
async function saveDato(field,val){await api('POST','/api/clients/'+currentClient+'/datos',{field,value:val});}

async function addStep(phaseId){
  const inp=document.getElementById('ns_'+phaseId);const text=inp.value.trim();if(!text)return;
  const tagSel=document.getElementById('nstag_'+phaseId);const tag=tagSel?tagSel.value:'Dev';
  await api('POST','/api/custom-steps',{phaseId,text,tag});
  await loadClients();
}
async function delStep(id){if(!confirm('¿Eliminar paso?'))return;await api('DELETE','/api/custom-steps/'+id);await loadClients();}

// Edit tasks
function startEdit(id,text,tag,isCustom){
  editingTask=id;renderMain();
  setTimeout(()=>{const el=document.getElementById('edit_text_'+id);if(el)el.focus();},50);
}
function cancelEdit(){editingTask=null;renderMain();}

async function saveEdit(id,isCustom){
  const textEl=document.getElementById('edit_text_'+id);
  const tagEl=document.getElementById('edit_tag_'+id);
  if(!textEl||!tagEl)return;
  const text=textEl.value.trim();const tag=tagEl.value;
  if(!text)return;
  if(isCustom){
    // For custom steps, delete and recreate with new text/tag
    const cs=customSteps.find(c=>c.id===id);
    if(cs){
      await api('DELETE','/api/custom-steps/'+id);
      await api('POST','/api/custom-steps',{phaseId:cs.phaseId,text,tag});
    }
  } else {
    await api('PUT','/api/task-overrides/'+id,{text,tag});
  }
  editingTask=null;
  await loadClients();
}

// Hide built-in tasks
async function hideTask(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  await api('POST','/api/hidden-tasks',{taskId:id});
  await loadClients();
}

// Cycle tag by clicking
async function cycleTag(id,currentTag,isCustom){
  const idx=TAG_OPTIONS.indexOf(currentTag);
  const nextTag=TAG_OPTIONS[(idx+1)%TAG_OPTIONS.length];
  if(isCustom){
    const cs=customSteps.find(c=>c.id===id);
    if(cs){
      await api('DELETE','/api/custom-steps/'+id);
      await api('POST','/api/custom-steps',{phaseId:cs.phaseId,text:cs.text,tag:nextTag});
    }
  } else {
    const ov=taskOverrides[id]||{};
    await api('PUT','/api/task-overrides/'+id,{text:ov.text||'',tag:nextTag});
  }
  await loadClients();
}

function togPh(id){document.getElementById('bd_'+id).classList.toggle('open');document.getElementById('chv_'+id).classList.toggle('open');}

async function exportCl(){
  if(!currentClient||!clientData)return;
  const checks=clientData.checks||{};const allItems=getVisibleItems();
  const done=allItems.filter(i=>checks[i.id]&&checks[i.id].done).length;
  let txt=`ONBOARDING: ${clientData.name}\n${new Date().toLocaleDateString('es')}\nTipo: ${clientData.tipo}\nProgreso: ${done}/${allItems.length}\n\n`;
  const tipo=clientData.tipo||'outbound+inbound';
  PHASES.forEach(p=>{
    const visibleSections=p.sections.filter(s=>shouldShowSection(s,tipo));
    if(visibleSections.length===0)return;
    const items=[...visibleSections.flatMap(s=>s.items.filter(i=>!isHidden(i.id))),...customSteps.filter(cs=>cs.phaseId===p.id&&!isHidden(cs.id))];
    const d=items.filter(i=>checks[i.id]&&checks[i.id].done).length;
    txt+=`${p.title}: ${d}/${items.length}\n`;
    items.forEach(i=>{txt+=`  ${checks[i.id]&&checks[i.id].done?'✅':'⬜'} ${getItemText(i)}\n`;});
    txt+='\n';
  });
  try{await navigator.clipboard.writeText(txt);alert('Copiado');}catch(e){prompt('Copiá manualmente:',txt);}
}

// Enter key in modal
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('modal').classList.contains('show'))confirmModal();});

// Init
renderApp();
</script>
</body>
</html>
