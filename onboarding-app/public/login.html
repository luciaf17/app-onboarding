<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0c0c0f;color:#e8e8ed;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#16161a;border:1px solid #2a2a32;border-radius:12px;padding:36px;width:90%;max-width:360px}
.login-box h2{font-size:20px;margin-bottom:4px}
.login-box .sub{color:#8b8b9a;font-size:13px;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#8b8b9a;margin-bottom:4px;font-weight:500}
.field input{width:100%;background:#1e1e24;border:1px solid #2a2a32;color:#e8e8ed;padding:10px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px}
.field input:focus{outline:none;border-color:#6ee7b7}
.btn{width:100%;padding:11px;border:none;border-radius:6px;background:#6ee7b7;color:#0c0c0f;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:#34d399}
.error{color:#f87171;font-size:12px;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <h2>Onboarding</h2>
  <p class="sub">Agentes de Voz · Iniciar sesión</p>
  <div class="field">
    <label>Usuario</label>
    <input type="text" id="user" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="pass" autocomplete="current-password">
  </div>
  <button class="btn" onclick="login()">Entrar</button>
  <div class="error" id="err">Credenciales incorrectas</div>
</div>
<script>
async function login(){
  const username=document.getElementById('user').value.trim();
  const password=document.getElementById('pass').value;
  const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  if(res.ok){window.location.href='/';}
  else{document.getElementById('err').style.display='block';}
}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
document.getElementById('user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pass').focus();});
</script>
</body>
</html>
