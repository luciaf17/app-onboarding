<!DOCTYPE html>

<head>

<title>Onboarding · Agentes de Voz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--s:#16161a;--s2:#1e1e24;--b:#2a2a32;--t:#e8e8ed;--t2:#8b8b9a;--a:#6ee7b7;--a2:#34d399;--y:#fbbf24;--yb:rgba(251,191,36,.1);--r:#f87171;--rb:rgba(248,113,113,.08);--bl:#60a5fa;--blb:rgba(96,165,250,.1);--gb:rgba(110,231,183,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--b)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar .logo{font-weight:700;font-size:15px;color:var(--a)}
.topbar .user-info{font-size:12px;color:var(--t2)}
.btn-logout{background:none;border:1px solid var(--b);color:var(--t2);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.btn-logout:hover{border-color:var(--r);color:var(--r)}

.client-bar{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.client-bar label{font-size:12px;color:var(--t2);font-weight:500}
.csel{background:var(--s2);border:1px solid var(--b);color:var(--t);padding:7px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;min-width:180px}
.csel:focus{outline:none;border-color:var(--a)}
.cbtns{display:flex;gap:5px;margin-left:auto}
.cb{padding:5px 12px;border-radius:5px;border:1px solid var(--b);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;background:var(--s2);transition:all .15s}
.cb-add{color:var(--a)}.cb-add:hover{background:var(--gb);border-color:var(--a)}
.cb-del{color:var(--r);border-color:transparent}.cb-del:hover{background:var(--rb)}
.cb-exp{color:var(--bl);border-color:transparent}.cb-exp:hover{background:var(--blb)}

.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:24px;width:90%;max-width:420px}
.modal h3{font-size:16px;margin-bottom:14px}
.modal-field{margin-bottom:10px}
.modal-field label{display:block;font-size:11px;color:var(--t2);margin-bottom:3px;font-weight:500}
.modal-field input,.modal-field select{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:8px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--a)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mb{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600}
.mb-c{background:var(--s2);color:var(--t2)}.mb-ok{background:var(--a);color:var(--bg)}.mb-ok:hover{background:var(--a2)}

.hero{padding:28px 0 20px;border-bottom:1px solid var(--b);margin-bottom:20px}
.hero h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.hero .sub{color:var(--t2);font-size:13px;margin-bottom:14px}
.pw{display:flex;align-items:center;gap:14px}
.pt{flex:1;height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.pb{height:100%;background:var(--a);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pl{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--a);min-width:90px;text-align:right}

.empty{text-align:center;padding:50px 20px;color:var(--t2)}
.empty p{margin-bottom:12px}

.phase{margin-bottom:10px;border:1px solid var(--b);border-radius:10px;background:var(--s);overflow:hidden}
.phase:hover{border-color:#3a3a44}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.phl{display:flex;align-items:center;gap:8px}
.pn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);background:var(--s2);padding:2px 7px;border-radius:4px}
.pnm{font-weight:600;font-size:14px}
.pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:4px}
.pill-r{background:var(--rb);color:var(--r)}.pill-y{background:var(--yb);color:var(--y)}.pill-b{background:var(--blb);color:var(--bl)}.pill-g{background:var(--gb);color:var(--a)}
.phr{display:flex;align-items:center;gap:10px}
.pc{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2)}
.pch{color:var(--t2);transition:transform .25s;font-size:15px}
.pch.open{transform:rotate(180deg)}
.pbody{display:none;padding:0 16px 14px}
.pbody.open{display:block}
.stit{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--b)}
.item{display:flex;align-items:flex-start;gap:9px;padding:5px 0}
.item input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:2px solid var(--b);border-radius:3px;cursor:pointer;flex-shrink:0;margin-top:2px;position:relative;transition:all .12s;background:transparent}
.item input[type=checkbox]:checked{background:var(--a);border-color:var(--a)}
.item input[type=checkbox]:checked::after{content:'\2713';position:absolute;top:-2px;left:1px;font-size:12px;color:var(--bg);font-weight:700}
.item label{cursor:pointer;font-size:13px;line-height:1.4;flex:1;transition:all .2s}
.item label.done{text-decoration:line-through;color:var(--t2);opacity:.5}
.tag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:3px;vertical-align:middle}
.tag-f{background:var(--yb);color:var(--y)}.tag-l{background:var(--gb);color:var(--a)}

.inote{width:100%;background:var(--s2);border:1px solid transparent;color:var(--t2);padding:4px 8px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:11px;margin-top:3px;resize:none;height:24px;transition:all .15s}
.inote:focus{outline:none;border-color:var(--a);color:var(--t);height:48px}
.inote::placeholder{color:#555}

.note{background:var(--yb);border-left:3px solid var(--y);padding:8px 12px;border-radius:0 6px 6px 0;margin:8px 0;font-size:12px;color:var(--y)}

.add-step{display:flex;gap:6px;margin-top:8px}
.add-step input{flex:1;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:6px 10px;border-radius:5px;font-size:12px;font-family:'DM Sans',sans-serif}
.add-step input:focus{outline:none;border-color:var(--a)}
.add-step button{padding:6px 12px;border:1px solid var(--a);background:transparent;color:var(--a);border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif}

.footer{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--b);flex-wrap:wrap}
.fbtn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;transition:all .15s}
.fbtn-r{background:var(--s2);color:var(--r)}.fbtn-r:hover{background:var(--rb)}
.fbtn-e{background:var(--s2);color:var(--a)}.fbtn-e:hover{background:var(--gb)}

.ts{font-size:10px;color:var(--t2);margin-top:8px;font-style:italic}

</div>

<div class="client-bar">
  <label>Cliente:</label>
  <select class="csel" id="csel" onchange="switchC()"></select>
  <div class="cbtns">
    <button class="cb cb-add" onclick="showNew()">+ Nuevo</button>
    <button class="cb cb-exp" onclick="exportS()">Copiar</button>
    <button class="cb cb-del" onclick="delC()">Eliminar</button>
  </div>
</div>

<div class="modal-bg" id="modal">

    <h3 id="mTitle">Nuevo cliente</h3>
    <div class="modal-field"><label>Nombre de la clínica</label><input id="mName" placeholder="Ej: RM Odontología"></div>
    <div class="modal-field"><label>Tipo de agente</label>
      <select id="mType">
        <option value="both">Outbound + Inbound</option>

        <option value="inbound">Solo Inbound</option>
      </select>
    </div>
    <div class="modal-btns"><button class="mb mb-c" onclick="closeM()">Cancelar</button><button class="mb mb-ok" onclick="confirmNew()">Crear</button></div>
  </div>
</div>

<div class="hero">
  <h1 id="hTitle">Seleccioná un cliente</h1>
  <p class="sub">Agente de Voz — GHL + n8n + Retell + Airtable + OpenAI</p>
  <div class="pw"><div class="pt"><div class="pb" id="pBar"></div></div><div class="pl" id="pLab">—</div></div>
</div>

<div id="root"></div>
<div class="footer" id="ftr" style="display:none">
  <button class="fbtn fbtn-r" onclick="resetC()">Resetear</button>
  <button class="fbtn fbtn-e" onclick="exportS()">Copiar estado</button>
</div>
<div class="ts" id="tsInfo"></div>
</div>

let db={clients:{},customSteps:[]};
let cur=null;
let currentUser=null;

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(path,opts);
  if(r.status===401){window.location.href='/';return null;}
  return r.json();
}

async function init(){
  const me=await api('GET','/api/me');
  if(!me)return;
  currentUser=me.user;
  document.getElementById('userInfo').textContent=me.user.name;
  const data=await api('GET','/api/clients');
  if(data){db=data;if(!db.clients)db.clients={};if(!db.customSteps)db.customSteps=[];}
  const keys=Object.keys(db.clients).sort();
  if(keys.length)cur=keys[0];
  popSel();
  render();
}

function popSel(){
  const s=document.getElementById('csel');
  const keys=Object.keys(db.clients).sort();
  s.innerHTML='';
  if(!keys.length){s.innerHTML='<option value="">— Sin clientes —</option>';cur=null;return;}
  keys.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=db.clients[k].name||k;if(k===cur)o.selected=true;s.appendChild(o);});
  if(!cur||!keys.includes(cur))cur=keys[0];
  s.value=cur;
}

function switchC(){cur=document.getElementById('csel').value||null;render();}
function showNew(){document.getElementById('mName').value='';document.getElementById('modal').classList.add('show');setTimeout(()=>document.getElementById('mName').focus(),100);}
function closeM(){document.getElementById('modal').classList.remove('show');}
async function confirmNew(){
  const name=document.getElementById('mName').value.trim();
  if(!name)return;
  const type=document.getElementById('mType').value;
  const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_');
  closeM();
  db.clients[id]={name,type,checks:{},notes:{},created:new Date().toISOString()};
  cur=id;
  await api('PUT','/api/clients/'+id,db.clients[id]);
  popSel();render();
}
async function delC(){
  if(!cur)return;
  if(!confirm('¿Eliminar "'+db.clients[cur].name+'"?'))return;
  await api('DELETE','/api/clients/'+cur);
  delete db.clients[cur];cur=null;popSel();render();
}
async function resetC(){
  if(!cur)return;
  if(!confirm('¿Resetear "'+db.clients[cur].name+'"?'))return;
  db.clients[cur].checks={};db.clients[cur].notes={};
  await api('PUT','/api/clients/'+cur,db.clients[cur]);render();
}
async function logout(){await api('POST','/api/logout');window.location.href='/';}

function getType(){return cur?db.clients[cur].type||'both':'both';}
function shouldShow(item){if(!item.show)return true;return item.show.includes(getType());}

function getVisibleItems(){
  const type=getType();
  let items=[];
  PHASES.forEach(p=>{
    if(!shouldShow(p))return;
    p.sections.forEach(s=>{
      if(!shouldShow(s))return;
      s.items.forEach(i=>{if(shouldShow(i))items.push(i);});
    });
  });
  db.customSteps.forEach(cs=>{items.push({id:cs.id,t:cs.t,tg:'Custom',tc:'tag-l'});});
  return items;
}

function updateP(){
  if(!cur){document.getElementById('pBar').style.width='0%';document.getElementById('pLab').textContent='—';return;}
  const checks=db.clients[cur].checks||{};
  const all=getVisibleItems();
  const done=all.filter(i=>checks[i.id]);
  const pct=all.length?Math.round(done.length/all.length*100):0;
  document.getElementById('pBar').style.width=pct+'%';
  document.getElementById('pLab').textContent=done.length+'/'+all.length+' · '+pct+'%';
  PHASES.forEach(p=>{
    if(!shouldShow(p))return;
    let items=[];
    p.sections.forEach(s=>{if(shouldShow(s))s.items.forEach(i=>{if(shouldShow(i))items.push(i);});});
    const d=items.filter(i=>checks[i.id]).length;
    const el=document.getElementById('cnt_'+p.id);
    if(el)el.textContent=d+'/'+items.length;
  });
}

let saveTimer=null;
function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{if(cur)api('PUT','/api/clients/'+cur,db.clients[cur]);},500);}

function togChk(id,cb,lbl){
  if(!cur)return;
  if(!db.clients[cur].checks)db.clients[cur].checks={};
  db.clients[cur].checks[id]=cb.checked;
  if(cb.checked)db.clients[cur].checks[id+'_date']=new Date().toISOString();
  lbl.classList.toggle('done',cb.checked);
  updateP();schedSave();
}

function updNote(id,val){
  if(!cur)return;
  if(!db.clients[cur].notes)db.clients[cur].notes={};
  db.clients[cur].notes[id]=val;
  schedSave();
}

function togPh(id){
  document.getElementById('bd_'+id).classList.toggle('open');
  document.getElementById('ch_'+id).classList.toggle('open');
}

async function addCustomStep(input){
  const t=input.value.trim();
  if(!t)return;
  const id='custom_'+Date.now();
  db.customSteps.push({id,t});
  input.value='';
  await api('PUT','/api/custom-steps',db.customSteps);
  render();
}

function render(){
  const root=document.getElementById('root');
  const ftr=document.getElementById('ftr');
  const ti=document.getElementById('tsInfo');
  document.getElementById('hTitle').textContent=cur?db.clients[cur].name:'Seleccioná un cliente';
  if(!cur){root.innerHTML='<div class="empty"><p>Creá un cliente para empezar</p></div>';ftr.style.display='none';ti.textContent='';updateP();return;}
  ftr.style.display='flex';
  const c=db.clients[cur];
  const checks=c.checks||{};
  const notes=c.notes||{};
  if(c.updatedBy)ti.textContent='Última edición: '+c.updatedBy+' · '+(c.updatedAt?new Date(c.updatedAt).toLocaleString('es'):'');
  else ti.textContent='';
  root.innerHTML='';
  const type=getType();

  PHASES.forEach(p=>{
    if(!shouldShow(p))return;
    const div=document.createElement('div');div.className='phase';
    let visItems=[];
    p.sections.forEach(s=>{if(shouldShow(s))s.items.forEach(i=>{if(shouldShow(i))visItems.push(i);});});
    const dc=visItems.filter(i=>checks[i.id]).length;
    let h=`<div class="ph" onclick="togPh('${p.id}')"><div class="phl"><span class="pn">${p.num}</span><span class="pnm">${p.title}</span><span class="pill ${p.pc}">${p.pill}</span></div><div class="phr"><span class="pc" id="cnt_${p.id}">${dc}/${visItems.length}</span><span class="pch" id="ch_${p.id}">▾</span></div></div>`;
    let b=`<div class="pbody" id="bd_${p.id}">`;
    if(p.note)b+=`<div class="note">${p.note}</div>`;
    p.sections.forEach(s=>{
      if(!shouldShow(s))return;
      if(s.label)b+=`<div class="stit">${s.label}</div>`;
      s.items.forEach(i=>{
        if(!shouldShow(i))return;
        const ck=checks[i.id]?'checked':'';
        const dc2=checks[i.id]?'done':'';
        const nv=notes[i.id]||'';
        b+=`<div class="item"><input type="checkbox" id="cb_${i.id}" ${ck} onchange="togChk('${i.id}',this,document.getElementById('lb_${i.id}'))"><label id="lb_${i.id}" for="cb_${i.id}" class="${dc2}">${i.t} <span class="tag ${i.tc}">${i.tg}</span></label></div>`;
        if(i.hasNote)b+=`<textarea class="inote" placeholder="Valor / nota..." oninput="updNote('${i.id}',this.value)">${nv}</textarea>`;
      });
    });
    b+='</div>';
    div.innerHTML=h+b;root.appendChild(div);
  });

  // Custom steps section
  if(db.customSteps.length||true){
    const cdiv=document.createElement('div');cdiv.className='phase';
    const cItems=db.customSteps;
    const cdc=cItems.filter(i=>checks[i.id]).length;
    let ch=`<div class="ph" onclick="togPh('pcustom')"><div class="phl"><span class="pn">++</span><span class="pnm">Pasos adicionales</span><span class="pill pill-b">Custom</span></div><div class="phr"><span class="pc" id="cnt_pcustom">${cdc}/${cItems.length}</span><span class="pch" id="ch_pcustom">▾</span></div></div>`;
    let cb=`<div class="pbody" id="bd_pcustom">`;
    cItems.forEach(i=>{
      const ck=checks[i.id]?'checked':'';
      const dc2=checks[i.id]?'done':'';
      cb+=`<div class="item"><input type="checkbox" id="cb_${i.id}" ${ck} onchange="togChk('${i.id}',this,document.getElementById('lb_${i.id}'))"><label id="lb_${i.id}" for="cb_${i.id}" class="${dc2}">${i.t} <span class="tag tag-l">Custom</span></label></div>`;
    });
    cb+=`<div class="add-step"><input id="newStepInput" placeholder="Agregar paso..." onkeydown="if(event.key==='Enter')addCustomStep(this)"><button onclick="addCustomStep(document.getElementById('newStepInput'))">Agregar</button></div>`;
    cb+='</div>';
    cdiv.innerHTML=ch+cb;root.appendChild(cdiv);
  }
  updateP();
}

function exportS(){
  if(!cur)return;
  const c=db.clients[cur];
  const checks=c.checks||{};
  const notes=c.notes||{};
  const all=getVisibleItems();
  const done=all.filter(i=>checks[i.id]).length;
  let txt=`ONBOARDING: ${c.name}\nTipo: ${c.type}\nFecha: ${new Date().toLocaleDateString('es')}\nProgreso: ${done}/${all.length}\n\n`;
  PHASES.forEach(p=>{
    if(!shouldShow(p))return;
    let items=[];
    p.sections.forEach(s=>{if(shouldShow(s))s.items.forEach(i=>{if(shouldShow(i))items.push(i);});});
    if(!items.length)return;
    const d=items.filter(i=>checks[i.id]).length;
    txt+=`${p.title}: ${d}/${items.length}\n`;
    items.forEach(i=>{
      txt+=`  ${checks[i.id]?'✅':'⬜'} ${i.t}`;
      if(notes[i.id])txt+=` → ${notes[i.id]}`;
      txt+='\n';
    });
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(()=>alert('Copiado'));
}

document.getElementById('mName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmNew();});
init();
</script>
</body>
</html>
